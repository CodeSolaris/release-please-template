version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # pnpm/action-setup v6 ignores the requested pnpm version:
    # https://github.com/pnpm/action-setup/issues/225
    # https://github.com/pnpm/action-setup/issues/227
    ignore:
      - dependency-name: pnpm/action-setup
        versions: ["6.x"]
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
