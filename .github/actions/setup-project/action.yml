name: Setup project
description: Install toolchain dependencies used by repository workflows.
runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v5
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: .node-version
        cache: pnpm
    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
